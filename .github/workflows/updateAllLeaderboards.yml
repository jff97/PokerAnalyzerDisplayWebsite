name: Update Static Cached Leaderboards

permissions:
  contents: write

on:
  repository_dispatch:
    types: [refresh_leaderboards]
  workflow_dispatch:

jobs:
  update-leaderboards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make Sure API is Reachable
        run: |
          for i in {1..3}; do
            if [ $(curl -s -o /dev/null -w "%{http_code}" "https://api.johnfoxweb.com") -eq 200 ]; then
              exit 0
            else
              sleep 40
            fi
          done
          exit 1
      
      - name: Create cache directory
        run: mkdir -p static/cachedLeaderboards
      
      - name: Fetch trueskill data
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/trueskill")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error response: $BODY"
            exit 1
          fi
          echo "$BODY" > "static/cachedLeaderboards/trueskill.json"

      - name: Fetch players outlasted data
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/players-outlasted")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error response: $BODY"
            exit 1
          fi
          echo "$BODY" > "static/cachedLeaderboards/players-outlasted.json"

      - name: Fetch ROI data
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/roi")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error response: $BODY"
            exit 1
          fi
          echo "$BODY" > "static/cachedLeaderboards/roi.json"

      - name: Fetch first place data
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/firstplace")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error response: $BODY"
            exit 1
          fi
          echo "$BODY" > "static/cachedLeaderboards/firstplace.json"

      - name: Fetch ITM percent data
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/itmpercent")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error response: $BODY"
            exit 1
          fi
          echo "$BODY" > "static/cachedLeaderboards/itmpercent.json"

      - name: Fetch placement distribution data
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/placement-distributions")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error response: $BODY"
            exit 1
          fi
          echo "$BODY" > "static/cachedLeaderboards/placement-distribution.json"
      
      - name: Fetch tournament qualifiers data
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.johnfoxweb.com/api/qualification/tournament-qualifiers")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error response: $BODY"
            exit 1
          fi
          echo "$BODY" > "static/cachedLeaderboards/tournament-qualifiers.json"
      
      #- name: Fetch community disconnectedness data
      #  run: curl -s "https://api.johnfoxweb.com/api/leaderboard/community-disconnectedness" > "static/cachedLeaderboards/community-disconnectedness.json"
      
      - name: Fetch monthly top points data
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/this-months-top-point-players")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error response: $BODY"
            exit 1
          fi
          echo "$BODY" > "static/cachedLeaderboards/months-top-point-players.json"
      
      - name: Fetch yearly top points data
        run: |
          TODAY_YEAR=$(date +'%Y')
          echo "Year: $TODAY_YEAR"
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/years-top-point-players?year=$TODAY_YEAR")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error response: $BODY"
            exit 1
          fi
          echo "$BODY" > "static/cachedLeaderboards/years-top-point-players.json"
      
      - name: Fetch all player names data
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.johnfoxweb.com/api/nametools/getallplayernames")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error response: $BODY"
            exit 1
          fi
          echo "$BODY" > "static/cachedLeaderboards/player-names.json"
      
      - name: Commit and Push
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add static/cachedLeaderboards/*.json
          git commit -m "Update all leaderboard data" || exit 0
          git push
