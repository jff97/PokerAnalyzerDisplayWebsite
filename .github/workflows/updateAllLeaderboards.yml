name: Update Static Cached Leaderboards

permissions:
  contents: write

on:
  repository_dispatch:
    types: [refresh_leaderboards]
  workflow_dispatch:

jobs:
  update-leaderboards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make Sure API is Reachable
        run: |
          for i in {1..3}; do
            if [ $(curl -s -o /dev/null -w "%{http_code}" "https://api.johnfoxweb.com") -eq 200 ]; then
              exit 0
            else
              sleep 40
            fi
          done
          exit 1
      
      - name: Create cache directory
        run: mkdir -p static/cachedLeaderboards
      
      - name: Fetch trueskill data
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o "static/cachedLeaderboards/trueskill.json" -w "%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/trueskill")
          [ "$HTTP_CODE" != "200" ] && echo "Failed (HTTP $HTTP_CODE)"

      - name: Fetch players outlasted data
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o "static/cachedLeaderboards/players-outlasted.json" -w "%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/players-outlasted")
          [ "$HTTP_CODE" != "200" ] && echo "Failed (HTTP $HTTP_CODE)"

      - name: Fetch ROI data
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o "static/cachedLeaderboards/roi.json" -w "%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/roi")
          [ "$HTTP_CODE" != "200" ] && echo "Failed (HTTP $HTTP_CODE)"

      - name: Fetch first place data
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o "static/cachedLeaderboards/firstplace.json" -w "%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/firstplace")
          [ "$HTTP_CODE" != "200" ] && echo "Failed (HTTP $HTTP_CODE)"

      - name: Fetch ITM percent data
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o "static/cachedLeaderboards/itmpercent.json" -w "%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/itmpercent")
          [ "$HTTP_CODE" != "200" ] && echo "Failed (HTTP $HTTP_CODE)"

      - name: Fetch placement distribution data
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o "static/cachedLeaderboards/placement-distribution.json" -w "%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/placement-distributions")
          [ "$HTTP_CODE" != "200" ] && echo "Failed (HTTP $HTTP_CODE)"
      
      - name: Fetch tournament qualifiers data
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o "static/cachedLeaderboards/tournament-qualifiers.json" -w "%{http_code}" "https://api.johnfoxweb.com/api/qualification/tournament-qualifiers")
          [ "$HTTP_CODE" != "200" ] && echo "Failed (HTTP $HTTP_CODE)"
      
      #- name: Fetch community disconnectedness data
      #  run: curl -s "https://api.johnfoxweb.com/api/leaderboard/community-disconnectedness" > "static/cachedLeaderboards/community-disconnectedness.json"
      
      - name: Fetch monthly top points data
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o "static/cachedLeaderboards/months-top-point-players.json" -w "%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/this-months-top-point-players")
          [ "$HTTP_CODE" != "200" ] && echo "Failed (HTTP $HTTP_CODE)"
      
      - name: Fetch yearly top points data
        continue-on-error: true
        run: |
          TODAY_YEAR=$(date +'%Y')
          HTTP_CODE=$(curl -s -o "static/cachedLeaderboards/years-top-point-players.json" -w "%{http_code}" "https://api.johnfoxweb.com/api/leaderboard/years-top-point-players?year=$TODAY_YEAR")
          [ "$HTTP_CODE" != "200" ] && echo "Failed (HTTP $HTTP_CODE)"
      
      - name: Fetch all player names data
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -s -o "static/cachedLeaderboards/player-names.json" -w "%{http_code}" "https://api.johnfoxweb.com/api/nametools/getallplayernames")
          [ "$HTTP_CODE" != "200" ] && echo "Failed (HTTP $HTTP_CODE)"
      
      - name: Commit and Push
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add static/cachedLeaderboards/*.json
          git commit -m "Update all leaderboard data" || exit 0
          git push
